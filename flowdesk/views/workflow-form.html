<a href="/" style="color:var(--muted);font-size:13px;">← Zurück</a>
<h1 style="margin-top:16px;">{{icon}} {{name}}</h1>
<p class="subtitle">{{description}}</p>

{{#if hasError}}
<div class="alert alert-error">{{errorMessage}}</div>
{{/if}}

<div class="form-card">
  {{#if hasHint}}
  <div class="alert alert-info" style="font-size:13px;">ℹ️ {{hint}}</div>
  {{/if}}
  <form method="POST" action="{{actionUrl}}">
    {{{fields}}}
    <div class="btn-row">
      <button type="submit" class="btn btn-primary">Antrag stellen</button>
      <a href="/" class="btn btn-ghost">Abbrechen</a>
    </div>
  </form>
</div>
