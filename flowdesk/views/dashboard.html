<h1>{{welcomeText}}, {{firstName}} 👋</h1>
<p class="subtitle">{{department}} · {{role}}</p>

{{#if showPending}}
<div class="section">
  <h2>⏳ Offene Genehmigungen</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Prozess</th><th>Von</th><th>Eingereicht</th><th></th></tr></thead>
      <tbody>{{{pendingRows}}}</tbody>
    </table>
  </div>
</div>
{{/if}}

<div class="section">
  <h2>🚀 Prozess starten</h2>
  <div class="card-grid">{{{workflowCards}}}</div>
</div>

<div class="section">
  <h2>📋 Meine Anträge</h2>
  <div class="table-wrap">
    <table>
      <thead><tr><th>Prozess</th><th>Status</th><th>Datum</th><th></th></tr></thead>
      <tbody>{{{myRequestRows}}}</tbody>
    </table>
  </div>
</div>
