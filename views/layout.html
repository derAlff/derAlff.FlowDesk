<!DOCTYPE html>
<html lang="{{language}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{pageTitle}} – {{appTitle}}</title>
  {{#if faviconUrl}}<link rel="icon" href="{{faviconUrl}}">{{/if}}
  <style>{{{themeCSS}}}</style>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav>
    {{{logoHtml}}}
    {{#if isLoggedIn}}
    <div class="nav-user">
      <span>{{userName}}</span>
      <span class="badge">{{userRole}}</span>
      <a href="/logout" class="logout">Abmelden</a>
    </div>
    {{/if}}
  </nav>
  <main>{{{body}}}</main>
</body>
</html>
